name: Release

on:
  push:
    tags: ['v*.*.*', 'v*.*.*-*']

permissions:
  contents: write

jobs:
  # ── Determine Version ────────────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION (prerelease: $([[ $VERSION == *-* ]] && echo true || echo false))"

      - id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "$GITHUB_REF_NAME" | tail -1)
          if [[ -z "$PREV_TAG" ]]; then
            CHANGELOG=$(git log --oneline --no-merges)
          else
            CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ── Build All Platforms ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
          - target: macos-x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
          - target: windows-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - target: linux-x64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.rust-target }}' }

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt update && sudo apt install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci
      - run: npm run build
      - run: cargo build --release --target ${{ matrix.rust-target }}
        working-directory: src-tauri
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with: { path: artifacts, pattern: 'release-*', merge-multiple: true }

      - name: Display structure
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.version.outputs.version }}
          tag_name: v${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.prerelease }}
          body: |
            ## v${{ needs.version.outputs.version }}

            ${{ needs.version.outputs.changelog }}

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          files: artifacts/**/*
          generate_release_notes: true
