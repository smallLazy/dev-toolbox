name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*.*.*', 'v*.*.*-*']

permissions:
  contents: write

jobs:
  # ── Determine Version ────────────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION (prerelease: $([[ $VERSION == *-* ]] && echo true || echo false))"

      - id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "$GITHUB_REF_NAME" | tail -1)
          if [[ -z "$PREV_TAG" ]]; then
            CHANGELOG=$(git log --oneline --no-merges)
          else
            CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ── Build All Platforms ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
          - target: macos-x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
          - target: windows-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - target: linux-x64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.rust-target }}' }

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt update && sudo apt install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci

      # ── Windows: use Tauri bundler to produce .msi / .exe ──────────
      - name: Build Windows installer
        if: matrix.target == 'windows-x64'
        run: npx tauri build --bundles msi,nsis,updater --target ${{ matrix.rust-target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Diagnose Windows build outputs
        if: matrix.target == 'windows-x64'
        run: |
          echo "=== Windows build diagnostics ==="
          echo "--- bundle tree ---"
          find src-tauri/target -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.zip' -o -name '*.sig' \) 2>/dev/null | sort || echo "(no matches)"
          echo "--- full bundle dir listing ---"
          ls -R src-tauri/target/${{ matrix.rust-target }}/release/bundle/ 2>/dev/null || echo "(bundle dir not found)"

      # ── macOS: use Tauri bundler to produce .dmg / .app ───────────
      - name: Build macOS installer
        if: startsWith(matrix.target, 'macos-')
        run: npx tauri build --bundles dmg,app --target ${{ matrix.rust-target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Rename macOS updater (include arch)
        if: startsWith(matrix.target, 'macos-')
        run: |
          ARCH="${{ matrix.target == 'macos-arm64' && 'aarch64' || 'x64' }}"
          BUNDLE="src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos"
          if [ -f "$BUNDLE/Dev Toolbox.app.tar.gz" ]; then
            mv "$BUNDLE/Dev Toolbox.app.tar.gz" "$BUNDLE/Dev Toolbox_${ARCH}.app.tar.gz"
          fi
          if [ -f "$BUNDLE/Dev Toolbox.app.tar.gz.sig" ]; then
            mv "$BUNDLE/Dev Toolbox.app.tar.gz.sig" "$BUNDLE/Dev Toolbox_${ARCH}.app.tar.gz.sig"
          fi
          echo "macOS updater artifacts renamed with arch: $ARCH"

      # ── Linux: use Tauri bundler to produce .deb / .AppImage ──────
      - name: Build Linux installer
        if: matrix.target == 'linux-x64'
        run: npx tauri build --bundles deb,appimage,updater --target ${{ matrix.rust-target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Diagnose Linux build outputs
        if: matrix.target == 'linux-x64'
        run: |
          echo "=== Linux build diagnostics ==="
          echo "--- bundle tree ---"
          find src-tauri/target -type f \( -name '*.deb' -o -name '*.AppImage' -o -name '*.tar.gz' -o -name '*.sig' \) 2>/dev/null | sort || echo "(no matches)"
          echo "--- full bundle dir listing ---"
          ls -R src-tauri/target/${{ matrix.rust-target }}/release/bundle/ 2>/dev/null || echo "(bundle dir not found)"

      # ── Upload artifacts ──────────────────────────────────────────
      - name: Upload Windows artifacts
        if: matrix.target == 'windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi.zip
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/updater/*.zip
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/updater/*.sig

      - name: Upload macOS artifacts
        if: startsWith(matrix.target, 'macos-')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Linux artifacts
        if: matrix.target == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage.tar.gz.sig

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Download artifacts (one dir per platform, no merge) ──────
      - uses: actions/download-artifact@v4
        with: { name: release-macos-arm64, path: artifacts/macos-arm64 }
      - uses: actions/download-artifact@v4
        with: { name: release-macos-x64, path: artifacts/macos-x64 }
      - uses: actions/download-artifact@v4
        with: { name: release-windows-x64, path: artifacts/windows-x64 }
      - uses: actions/download-artifact@v4
        with: { name: release-linux-x64, path: artifacts/linux-x64 }

      # ── Stage release assets & generate latest.json ───────────────
      - name: Stage assets & generate latest.json
        run: |
          mkdir -p release-assets
          node -e '
          const fs = require("fs");
          const path = require("path");
          const { execSync } = require("child_process");

          const VERSION = process.env.VERSION;
          const BASE_URL = `https://github.com/smallLazy/dev-toolbox/releases/download/v${VERSION}`;
          const ASSETS = "release-assets";
          const platforms = {};

          function findOne(dir, namePattern) {
            try {
              const r = execSync(`find "${dir}" -name "${namePattern}" -type f 2>/dev/null | head -1`, { encoding: "utf8" }).trim();
              return r || null;
            } catch { return null; }
          }
          function findAll(dir, namePattern) {
            try {
              return execSync(`find "${dir}" -name "${namePattern}" -type f 2>/dev/null`, { encoding: "utf8" }).trim().split("\n").filter(Boolean);
            } catch { return []; }
          }
          function stage(filePath) {
            if (!filePath || !fs.existsSync(filePath)) return null;
            const name = path.basename(filePath);
            fs.copyFileSync(filePath, path.join(ASSETS, name));
            return name;
          }
          function readText(f) {
            return (f && fs.existsSync(f)) ? fs.readFileSync(f, "utf8").trim() : "";
          }

          // ── macOS aarch64 ──────────────────────────────────────────
          const macArm = "artifacts/macos-arm64";
          const macArmUpdater = findOne(macArm, "*.app.tar.gz");
          const macArmSig = findOne(macArm, "*.app.tar.gz.sig");
          if (macArmUpdater) {
            const n = stage(macArmUpdater); stage(macArmSig);
            platforms["darwin-aarch64"] = { signature: readText(macArmSig), url: `${BASE_URL}/${encodeURIComponent(n)}` };
          }
          for (const f of findAll(macArm, "*.dmg")) stage(f);

          // ── macOS x64 ──────────────────────────────────────────────
          const macX64 = "artifacts/macos-x64";
          const macX64Updater = findOne(macX64, "*.app.tar.gz");
          const macX64Sig = findOne(macX64, "*.app.tar.gz.sig");
          if (macX64Updater) {
            const n = stage(macX64Updater); stage(macX64Sig);
            platforms["darwin-x86_64"] = { signature: readText(macX64Sig), url: `${BASE_URL}/${encodeURIComponent(n)}` };
          }
          for (const f of findAll(macX64, "*.dmg")) stage(f);

          // ── Windows ────────────────────────────────────────────────
          const win = "artifacts/windows-x64";
          const winUpdater = findOne(win, "*.msi.zip");
          const winSig = findOne(win, "*.msi.zip.sig");
          if (winUpdater) {
            const n = stage(winUpdater); stage(winSig);
            platforms["windows-x86_64"] = { signature: readText(winSig), url: `${BASE_URL}/${encodeURIComponent(n)}` };
          }
          for (const f of findAll(win, "*.msi")) stage(f);
          for (const f of findAll(win, "*setup*.exe")) stage(f);

          // ── Linux ──────────────────────────────────────────────────
          const linux = "artifacts/linux-x64";
          for (const f of findAll(linux, "*.deb")) stage(f);
          for (const f of findAll(linux, "*.AppImage")) {
            if (!f.endsWith(".tar.gz") && !f.endsWith(".sig")) stage(f);
          }
          const linuxUpdater = findOne(linux, "*.AppImage.tar.gz");
          const linuxSig = findOne(linux, "*.AppImage.tar.gz.sig");
          if (linuxUpdater) {
            const n = stage(linuxUpdater); stage(linuxSig);
            platforms["linux-x86_64"] = { signature: readText(linuxSig), url: `${BASE_URL}/${encodeURIComponent(n)}` };
          }

          // ── latest.json ────────────────────────────────────────────
          const manifest = { version: VERSION, notes: `See https://github.com/smallLazy/dev-toolbox/releases/tag/v${VERSION}`, pub_date: new Date().toISOString(), platforms };
          const manifestPath = path.join(ASSETS, "latest.json");
          fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2));
          console.log(JSON.stringify(manifest, null, 2));

          console.log("\n=== Release assets ===");
          for (const f of fs.readdirSync(ASSETS).sort()) console.log("  " + f);
          '
        env:
          VERSION: ${{ needs.version.outputs.version }}

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.version.outputs.version }}
          tag_name: v${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.prerelease }}
          body: |
            ## v${{ needs.version.outputs.version }}

            ${{ needs.version.outputs.changelog }}

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          files: release-assets/*
          generate_release_notes: true
