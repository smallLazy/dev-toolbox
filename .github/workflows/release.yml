name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*.*.*', 'v*.*.*-*']

permissions:
  contents: write

jobs:
  # ── Determine Version ────────────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION (prerelease: $([[ $VERSION == *-* ]] && echo true || echo false))"

      - id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "$GITHUB_REF_NAME" | tail -1)
          if [[ -z "$PREV_TAG" ]]; then
            CHANGELOG=$(git log --oneline --no-merges)
          else
            CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ── Build All Platforms ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
          - target: macos-x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
          - target: windows-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - target: linux-x64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.rust-target }}' }

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt update && sudo apt install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci

      # ── Windows: use Tauri bundler to produce .msi / .exe ──────────
      - name: Build Windows installer
        if: matrix.target == 'windows-x64'
        run: npx tauri build --bundles msi,nsis --target ${{ matrix.rust-target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ── macOS: use Tauri bundler to produce .dmg / .app ───────────
      - name: Build macOS installer
        if: startsWith(matrix.target, 'macos-')
        run: npx tauri build --bundles dmg,app --target ${{ matrix.rust-target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ── Linux: use Tauri bundler to produce .deb / .AppImage ──────
      - name: Build Linux installer
        if: matrix.target == 'linux-x64'
        run: npx tauri build --bundles deb,appimage --target ${{ matrix.rust-target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ── Upload artifacts ──────────────────────────────────────────
      - name: Upload Windows artifacts
        if: matrix.target == 'windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/updater/*.zip
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/updater/*.sig

      - name: Upload non-Windows artifacts
        if: matrix.target != 'windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with: { path: artifacts, pattern: 'release-*', merge-multiple: true }

      - name: Display structure
        run: find artifacts -type f | sort

      # ── Generate latest.json for Tauri updater ──────────────────────
      - name: Generate latest.json
        id: manifest
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");

          const VERSION = process.env.VERSION;
          const NOW = new Date().toISOString();
          const BASE_URL = `https://github.com/smallLazy/dev-toolbox/releases/download/v${VERSION}`;

          function findFile(patternDesc, namePattern, excludePattern) {
            const { execSync } = require("child_process");
            try {
              const result = execSync(`find artifacts -name "${namePattern}" -not -name "${excludePattern || "*.sig"}" | head -1`, { encoding: "utf8" }).trim();
              return result || null;
            } catch { return null; }
          }

          function readSig(sigFile) {
            if (!sigFile || !fs.existsSync(sigFile)) return "";
            return fs.readFileSync(sigFile, "utf8").trim();
          }

          const platforms = {};

          // macOS aarch64
          const macArmApp = findFile("macOS ARM", "*_aarch64.app.tar.gz");
          if (macArmApp) {
            platforms["darwin-aarch64"] = {
              signature: readSig(macArmApp + ".sig"),
              url: `${BASE_URL}/${path.basename(macArmApp)}`
            };
          }

          // macOS x86_64
          const macX64App = findFile("macOS x64", "*_x64.app.tar.gz");
          if (macX64App) {
            platforms["darwin-x86_64"] = {
              signature: readSig(macX64App + ".sig"),
              url: `${BASE_URL}/${path.basename(macX64App)}`
            };
          }

          // Windows x86_64 (MSI updater)
          const winMsi = findFile("Windows MSI", "*.msi.zip");
          if (winMsi) {
            platforms["windows-x86_64"] = {
              signature: readSig(winMsi + ".sig"),
              url: `${BASE_URL}/${path.basename(winMsi)}`
            };
          }

          // Linux x86_64 (AppImage updater)
          const linuxAppImage = findFile("Linux AppImage", "*.AppImage.tar.gz");
          if (linuxAppImage) {
            platforms["linux-x86_64"] = {
              signature: readSig(linuxAppImage + ".sig"),
              url: `${BASE_URL}/${path.basename(linuxAppImage)}`
            };
          }

          const manifest = {
            version: VERSION,
            notes: `See https://github.com/smallLazy/dev-toolbox/releases/tag/v${VERSION}`,
            pub_date: NOW,
            platforms
          };

          fs.writeFileSync("latest.json", JSON.stringify(manifest, null, 2));
          console.log("Generated latest.json:");
          console.log(JSON.stringify(manifest, null, 2));
          '
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.version.outputs.version }}
          tag_name: v${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.prerelease }}
          body: |
            ## v${{ needs.version.outputs.version }}

            ${{ needs.version.outputs.changelog }}

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          files: |
            artifacts/**/*
            latest.json
          generate_release_notes: true
