name: Build — Multi-Platform

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    tags: ['v*']

jobs:
  # ── macOS Apple Silicon ──────────────────────────────────────────────
  macos-arm64:
    name: macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: 'aarch64-apple-darwin' }

      - run: npm ci
      - run: npm run build
      - run: cargo build --release
        working-directory: src-tauri
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: dev-toolbox-macos-arm64
          path: src-tauri/target/release/bundle/
          retention-days: 90

  # ── macOS Intel ──────────────────────────────────────────────────────
  macos-x64:
    name: macOS (x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: 'x86_64-apple-darwin' }

      - run: npm ci
      - run: npm run build
      - run: cargo build --release --target x86_64-apple-darwin
        working-directory: src-tauri
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: dev-toolbox-macos-x64
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/
          retention-days: 90

  # ── Windows ──────────────────────────────────────────────────────────
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: 'x86_64-pc-windows-msvc' }

      - run: npm ci
      - run: npm run build
      - run: cargo build --release
        working-directory: src-tauri
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: dev-toolbox-windows-x64
          path: src-tauri/target/release/bundle/
          retention-days: 90

  # ── Linux ────────────────────────────────────────────────────────────
  linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: sudo apt update && sudo apt install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci
      - run: npm run build
      - run: cargo build --release
        working-directory: src-tauri
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: dev-toolbox-linux-x64
          path: src-tauri/target/release/bundle/
          retention-days: 90
